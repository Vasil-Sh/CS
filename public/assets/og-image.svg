<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E293B"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="950" cy="100" r="250" fill="#3B82F6" opacity="0.08"/>
  <circle cx="200" cy="500" r="300" fill="#6366F1" opacity="0.06"/>
  <!-- Icon area -->
  <rect x="100" y="140" width="120" height="120" rx="32" fill="url(#accent)" opacity="0.15"/>
  <text x="160" y="215" font-family="system-ui, sans-serif" font-size="56" fill="white" text-anchor="middle" dominant-baseline="middle">📊</text>
  <!-- Title -->
  <text x="260" y="210" font-family="system-ui, sans-serif" font-size="64" font-weight="bold" fill="white">MatchIQ</text>
  <!-- Subtitle -->
  <text x="260" y="260" font-family="system-ui, sans-serif" font-size="22" fill="#94A3B8">CS2 Match Analytics &amp; Betting Intelligence</text>
  <!-- Description -->
  <text x="100" y="380" font-family="system-ui, sans-serif" font-size="26" fill="#E2E8F0" font-weight="500">EV-детектор • Алгоритм Келлі • AI-рекомендації</text>
  <text x="100" y="425" font-family="system-ui, sans-serif" font-size="26" fill="#E2E8F0" font-weight="500">Трекінг банкролу • Контроль ризиків • Ріст ROI</text>
  <!-- Tagline -->
  <text x="100" y="520" font-family="system-ui, sans-serif" font-size="20" fill="#64748B">Перетворюйте хаотичні рішення на стабільну стратегію</text>
