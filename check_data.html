<!DOCTYPE html>
<html>
<head><title>Check Data</title></head>
<body>
<h1>Checking localStorage data...</h1>
<pre id="output"></pre>
<script>
const currentUser = localStorage.getItem('currentUser') || '';
const mybetsData = JSON.parse(localStorage.getItem(`${currentUser}_mybets_data`) || '[]');
const analyticsStats = JSON.parse(localStorage.getItem(`${currentUser}_analytics_stats`) || '{}');

let output = '=== MyBets Data ===\n';
output += `Total bets: ${mybetsData.length}\n\n`;

mybetsData.forEach((bet, i) => {
  output += `Bet ${i + 1}:\n`;
  output += `  Currency: ${bet.currency || 'UAH'}\n`;
  output += `  Amount: ${bet.amount}\n`;
  output += `  Original Amount: ${bet.originalAmount}\n`;
  output += `  Result: ${bet.result}\n`;
  output += `  Profit: ${bet.profit}\n`;
  output += `  Original Profit: ${bet.originalProfit}\n`;
  output += `  Exchange Rate: ${bet.exchangeRate}\n`;
  output += '\n';
});

output += '\n=== Analytics Stats ===\n';
output += JSON.stringify(analyticsStats, null, 2);

document.getElementById('output').textContent = output;
console.log(output);
</script>
</body>
</html>
