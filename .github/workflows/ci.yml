name: CI — Lint, Test, Build

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: ESLint
        run: npx eslint src/ --max-warnings=999
      - name: Tests
        run: npx vitest run
      - name: Build
        run: npx vite build
